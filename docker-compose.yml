---
services:
  querycast:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: querycast
    ports:
      - "4007:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - querycast-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  querycast-network:
    driver: bridge
